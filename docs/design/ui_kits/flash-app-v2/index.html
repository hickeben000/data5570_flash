<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash — Design System v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Nunito', sans-serif; background: #0f172a; overflow: hidden; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9999px; }

    /* View toggle */
    .view-toggle {
      position: fixed; bottom: 24px; right: 24px; z-index: 100;
      display: flex; background: #1e293b; border-radius: 12px; padding: 4px; gap: 2px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .view-btn {
      padding: 8px 16px; border-radius: 9px; border: none; cursor: pointer;
      font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; transition: all 0.15s;
    }
    .view-btn.active { background: #4361ee; color: #fff; }
    .view-btn.inactive { background: transparent; color: #64748b; }

    /* Web shell */
    .web-shell {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      background: #f0f4ff;
      animation: fadeIn 0.3s ease;
    }
    .web-topbar {
      height: 96px; background: #fff; border-bottom: 1px solid #e2e8f0;
      display: flex; align-items: center; padding: 0 24px; gap: 16px;
      flex-shrink: 0; box-shadow: 0 1px 3px rgba(15,23,42,0.05);
    }
    .web-main { flex: 1; display: flex; overflow: hidden; }

    /* Mobile shell */
    .mobile-outer {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: #0f172a;
    }
    .mobile-shell {
      width: 390px; height: 844px;
      background: #f0f4ff; border-radius: 48px; overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 14px #1e293b, inset 0 0 0 2px #334155;
      display: flex; flex-direction: column;
      animation: fadeIn 0.3s ease;
    }
    .mobile-status {
      height: 50px; background: #fff; display: flex; align-items: flex-end;
      padding: 0 26px 10px; justify-content: space-between; flex-shrink: 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .mobile-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .mobile-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="LoginPage.jsx"></script>
<script type="text/babel" src="DashboardPage.jsx"></script>
<script type="text/babel" src="CoursePage.jsx"></script>
<script type="text/babel" src="FlashcardPage.jsx"></script>
<script type="text/babel" src="QuizPage.jsx"></script>
<script type="text/babel" src="SettingsPage.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

function App() {
  const [view, setView] = useState(() => localStorage.getItem('flash_view') || 'web');
  const [screen, setScreen] = useState(() => localStorage.getItem('flash_screen_v2') || 'login');
  const [tab, setTab] = useState('dashboard');
  const [course, setCourse] = useState(null);
  const [quizData, setQuizData] = useState(null);

  useEffect(() => { localStorage.setItem('flash_view', view); }, [view]);
  useEffect(() => { localStorage.setItem('flash_screen_v2', screen); }, [screen]);

  const go = useCallback((s) => setScreen(s), []);
  const isMobile = view === 'mobile';

  const handleNav = (id) => {
    setTab(id);
    go(id);
  };

  const renderScreen = () => {
    switch (screen) {
      case 'login':
        return <LoginPage onLogin={() => { go('dashboard'); setTab('dashboard'); }} onGoRegister={() => go('register')} isMobile={isMobile} />;
      case 'register':
        return <RegisterPage onRegister={() => { go('dashboard'); setTab('dashboard'); }} onGoLogin={() => go('login')} isMobile={isMobile} />;
      case 'dashboard':
        return <DashboardPage onOpenCourse={c => { setCourse(c); go('course'); }} isMobile={isMobile} />;
      case 'course':
        return <CoursePage course={course} onBack={() => go('dashboard')} onFlashcards={() => go('flashcards')} onQuiz={() => go('quiz')} isMobile={isMobile} />;
      case 'flashcards':
        return <FlashcardPage course={course} onBack={() => go('course')} />;
      case 'quiz':
        return <QuizPage course={course} onBack={() => go('course')} onFinish={(ans, qs) => { setQuizData({ ans, qs }); go('results'); }} />;
      case 'results':
        return <QuizResultsPage answers={quizData?.ans} questions={quizData?.qs} onBack={() => go('course')} onRetry={() => go('quiz')} />;
      case 'settings':
        return <SettingsPage onLogout={() => { go('login'); setTab('dashboard'); }} />;
      default:
        return <DashboardPage onOpenCourse={c => { setCourse(c); go('course'); }} isMobile={isMobile} />;
    }
  };

  const inApp = !['login', 'register'].includes(screen);
  const showNav = inApp;

  /* ── WEB LAYOUT ─────────────────────────────── */
  if (view === 'web') {
    return (
      <>
        <div className="web-shell">
          {/* Top bar */}
          <div className="web-topbar">
            <img src="../../assets/flash-logo.png" alt="Flash" style={{ height: 80, objectFit: 'contain', cursor: 'pointer' }} onClick={() => go('dashboard')} />
            <div style={{ flex: 1 }} />
            {inApp && (
              <>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, background: '#f8fafc', border: '1px solid #e2e8f0', borderRadius: 10, padding: '8px 14px', width: 220 }}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                  <span style={{ fontSize: 13, color: '#94a3b8' }}>Search courses…</span>
                </div>
                <div style={{ width: 36, height: 36, borderRadius: '50%', background: 'linear-gradient(135deg,#2B7FFF,#1560F0)', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 13, cursor: 'pointer' }}>JD</div>
              </>
            )}
          </div>

          <div className="web-main">
            {showNav && <Sidebar active={tab} onNav={handleNav} onLogout={() => { go('login'); setTab('dashboard'); }} isMobile={false} />}
            <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
              {renderScreen()}
            </div>
          </div>
        </div>

        {/* View toggle */}
        <div className="view-toggle">
          <button className={`view-btn ${view === 'web' ? 'active' : 'inactive'}`} onClick={() => setView('web')}>
            <svg width="12" height="12" style={{ marginRight: 5 }} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            Web
          </button>
          <button className={`view-btn ${view === 'mobile' ? 'active' : 'inactive'}`} onClick={() => setView('mobile')}>
            <svg width="12" height="12" style={{ marginRight: 5 }} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
            Mobile
          </button>
        </div>
      </>
    );
  }

  /* ── MOBILE LAYOUT ───────────────────────────── */
  return (
    <>
      <div className="mobile-outer">
        <div className="mobile-shell">
          {/* Status bar */}
          <div className="mobile-status">
            <span style={{ fontSize: 13, fontWeight: 700, color: '#0f172a' }}>9:41</span>
            <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
              <svg width="14" height="10" viewBox="0 0 24 16" fill="#0f172a"><rect x="0" y="4" width="4" height="12" rx="1"/><rect x="6" y="2" width="4" height="14" rx="1"/><rect x="12" y="0" width="4" height="16" rx="1"/><rect x="18" y="0" width="4" height="16" rx="1" opacity="0.3"/></svg>
              <svg width="16" height="12" viewBox="0 0 24 18" fill="none" stroke="#0f172a" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1" fill="#0f172a" stroke="none"/></svg>
              <svg width="24" height="12" viewBox="0 0 30 14"><rect x="0" y="1" width="24" height="12" rx="3" stroke="#0f172a" strokeWidth="1.5" fill="none"/><rect x="25" y="4" width="2" height="6" rx="1" fill="#0f172a" opacity="0.5"/><rect x="1.5" y="2.5" width="18" height="9" rx="2" fill="#0f172a"/></svg>
            </div>
          </div>

          <div className="mobile-content">
            <div className="mobile-scroll">
              {renderScreen()}
            </div>
            {showNav && <BottomTabs active={tab} onNav={handleNav} />}
          </div>
        </div>
      </div>

      {/* View toggle */}
      <div className="view-toggle">
        <button className={`view-btn ${view === 'web' ? 'active' : 'inactive'}`} onClick={() => setView('web')}>
          <svg width="12" height="12" style={{ marginRight: 5 }} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          Web
        </button>
        <button className={`view-btn ${view === 'mobile' ? 'active' : 'inactive'}`} onClick={() => setView('mobile')}>
          <svg width="12" height="12" style={{ marginRight: 5 }} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
          Mobile
        </button>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
