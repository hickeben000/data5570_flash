<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash — UI Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .phone-shell {
      width: 390px;
      height: 844px;
      background: #f5f7fb;
      border-radius: 44px;
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 12px #2a2a3e, inset 0 0 0 2px #3a3a5e;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .status-bar {
      background: #ffffff;
      height: 50px;
      display: flex;
      align-items: flex-end;
      padding: 0 24px 10px;
      justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .status-time { color: #1a1a2e; font-size: 13px; font-weight: 700; }
    .status-icons { display: flex; gap: 6px; align-items: center; }
    .status-icons svg { width: 14px; height: 14px; fill: #1a1a2e; }
    .screen-area { flex: 1; overflow: hidden; position: relative; display: flex; flex-direction: column; }
    .tab-bar {
      background: #fff;
      border-top: 1px solid #e5e7eb;
      height: 72px;
      display: flex;
      align-items: flex-start;
      padding-top: 10px;
      flex-shrink: 0;
    }
    .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
    .tab-item svg { width: 22px; height: 22px; }
    .tab-label { font-size: 10px; font-weight: 700; }
    .tab-active { color: #4361ee; }
    .tab-inactive { color: #9ca3af; }
    .screen-scroll { flex: 1; overflow-y: auto; }
    /* Gradient header for inner screens */
    .inner-header {
      background: linear-gradient(135deg,#2B7FFF,#1560F0);
      padding: 14px 20px 18px;
      flex-shrink: 0;
    }
    .inner-header-title { color: #fff; font-size: 18px; font-weight: 800; }
    .inner-header-sub { color: rgba(255,255,255,0.8); font-size: 12px; margin-top: 2px; }
  </style>
</head>
<body>

<script type="text/babel" src="LoginScreen.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="FlashcardScreen.jsx"></script>
<script type="text/babel" src="QuizScreen.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TABS = ['home', 'settings'];

function App() {
  const savedScreen = localStorage.getItem('flash_screen') || 'login';
  const [screen, setScreen] = useState(savedScreen);
  const [activeTab, setActiveTab] = useState('home');
  const [selectedCourse, setSelectedCourse] = useState(null);
  const [quizAnswers, setQuizAnswers] = useState(null);
  const [quizQuestions, setQuizQuestions] = useState(null);

  useEffect(() => { localStorage.setItem('flash_screen', screen); }, [screen]);

  const go = s => setScreen(s);

  const renderScreen = () => {
    switch (screen) {
      case 'login':
        return <LoginScreen onLogin={() => go('home')} onGoRegister={() => go('register')} />;
      case 'register':
        return <RegisterPlaceholder onBack={() => go('login')} onDone={() => go('home')} />;
      case 'home':
        return <HomeScreen onOpenCourse={c => { setSelectedCourse(c); go('course'); }} />;
      case 'course':
        return <CourseScreen course={selectedCourse} onBack={() => go('home')} onFlashcards={() => go('flashcards')} onQuiz={() => go('quiz')} />;
      case 'flashcards':
        return <FlashcardScreen course={selectedCourse} onBack={() => go('course')} />;
      case 'quiz':
        return <QuizScreen course={selectedCourse} onBack={() => go('course')} onFinish={(ans, qs) => { setQuizAnswers(ans); setQuizQuestions(qs); go('quiz-results'); }} />;
      case 'quiz-results':
        return <QuizResultsScreen answers={quizAnswers} questions={quizQuestions} onBack={() => go('course')} onRetry={() => go('quiz')} />;
      case 'settings':
        return <SettingsPlaceholder onLogout={() => go('login')} />;
      default:
        return <HomeScreen />;
    }
  };

  const showTabBar = ['home', 'course', 'settings'].includes(screen);
  const showStatus = true;
  const isLogin = screen === 'login' || screen === 'register';

  return (
    <div className="phone-shell">
      {/* Status bar */}
      <div className="status-bar">
        <span className="status-time">9:41</span>
        <div className="status-icons">
          <svg viewBox="0 0 24 24"><path d="M1 6l5 5 6-6 6 6 5-5"/></svg>
          <svg viewBox="0 0 24 24"><rect x="2" y="7" width="16" height="11" rx="2"/><path d="M22 11v3"/></svg>
        </div>
      </div>

      {/* Screen area */}
      <div className="screen-area">
        <div className="screen-scroll">
          {renderScreen()}
        </div>
      </div>

      {/* Tab bar */}
      {showTabBar && (
        <div className="tab-bar">
          <div className="tab-item" onClick={() => { setActiveTab('home'); go('home'); }}>
            <svg viewBox="0 0 24 24" fill="none" stroke={activeTab === 'home' ? '#4361ee' : '#9ca3af'} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
            <span className="tab-label" style={{ color: activeTab === 'home' ? '#4361ee' : '#9ca3af' }}>Courses</span>
          </div>
          <div className="tab-item" onClick={() => { setActiveTab('settings'); go('settings'); }}>
            <svg viewBox="0 0 24 24" fill="none" stroke={activeTab === 'settings' ? '#4361ee' : '#9ca3af'} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            <span className="tab-label" style={{ color: activeTab === 'settings' ? '#4361ee' : '#9ca3af' }}>Settings</span>
          </div>
        </div>
      )}
    </div>
  );
}

// Inline simple screens
function CourseScreen({ course, onBack, onFlashcards, onQuiz }) {
  const docs = [
    { id: 1, name: 'Chapter 5 Notes.pdf', date: 'Apr 15, 2025' },
    { id: 2, name: 'Midterm Review.txt', date: 'Apr 18, 2025' },
  ];
  return (
    <div style={{ flex:1, background:'#f5f7fb', minHeight:'100%' }}>
      <div style={{ background:'linear-gradient(135deg,#2B7FFF,#1560F0)', padding:'16px 20px 20px' }}>
        <button onClick={onBack} style={{ background:'none', border:'none', color:'rgba(255,255,255,0.85)', fontWeight:700, fontSize:15, cursor:'pointer', fontFamily:'Nunito,sans-serif', padding:0, marginBottom:10 }}>← Back</button>
        <div style={{ color:'#fff', fontSize:24, fontWeight:800 }}>{course?.name || 'Biology 101'}</div>
        <div style={{ color:'rgba(255,255,255,0.8)', fontSize:13, marginTop:4 }}>2 documents · Last updated Apr 18</div>
      </div>
      <div style={{ padding:'16px 20px' }}>
        <div style={{ display:'flex', gap:10, marginBottom:20 }}>
          <button onClick={onFlashcards} style={{ flex:1, background:'#4361ee', color:'#fff', border:'none', borderRadius:12, padding:'13px 0', fontWeight:700, fontSize:14, fontFamily:'Nunito,sans-serif', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            Flashcards
          </button>
          <button onClick={onQuiz} style={{ flex:1, background:'#fff', color:'#4361ee', border:'2px solid #4361ee', borderRadius:12, padding:'13px 0', fontWeight:700, fontSize:14, fontFamily:'Nunito,sans-serif', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Quiz
          </button>
        </div>
        <div style={{ fontSize:11, fontWeight:700, color:'#9ca3af', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:10 }}>Documents</div>
        {docs.map(d => (
          <div key={d.id} style={{ background:'#fff', borderRadius:14, padding:'13px 16px', marginBottom:10, boxShadow:'0 1px 5px rgba(0,0,0,0.07)', display:'flex', alignItems:'center', gap:12 }}>
            <div style={{ width:36, height:36, borderRadius:9, background:'linear-gradient(135deg,#6366f1,#4361ee)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            </div>
            <div>
              <div style={{ fontSize:14, fontWeight:700, color:'#1a1a2e' }}>{d.name}</div>
              <div style={{ fontSize:12, color:'#9ca3af', marginTop:2 }}>Uploaded {d.date}</div>
            </div>
          </div>
        ))}
        <div style={{ background:'#fff', borderRadius:14, padding:'13px 16px', marginTop:4, boxShadow:'0 1px 5px rgba(0,0,0,0.07)', display:'flex', alignItems:'center', justifyContent:'center', gap:8, cursor:'pointer', border:'1.5px dashed #dfe4f1' }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4361ee" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span style={{ fontSize:14, fontWeight:700, color:'#4361ee' }}>Add Document</span>
        </div>
      </div>
    </div>
  );
}

function RegisterPlaceholder({ onBack, onDone }) {
  const [u, setU] = useState(''); const [p, setP] = useState('');
  return (
    <div style={{ flex:1, background:'#f5f7fb', minHeight:'100%', boxSizing:'border-box', display:'flex', flexDirection:'column' }}>
      <div style={{ background:'#ffffff', padding:'40px 24px 28px', display:'flex', flexDirection:'column', alignItems:'center', gap:8 }}>
        <img src="../../assets/flash-logo.png" alt="Flash" style={{ height:160, objectFit:'contain' }}/>
        <div style={{ color:'#4361ee', fontSize:14, fontFamily:'Nunito,sans-serif', fontWeight:700 }}>Join Flash and start studying smarter.</div>
      </div>
      <div style={{ padding:'28px 24px 32px', display:'flex', flexDirection:'column', flex:1 }}>
        <div style={{ fontSize:22, fontWeight:800, color:'#1a1a2e', marginBottom:18 }}>Create account</div>
        <input style={regSt.input} placeholder="Username" value={u} onChange={e=>setU(e.target.value)}/>
        <input style={regSt.input} type="password" placeholder="Password" value={p} onChange={e=>setP(e.target.value)}/>
        <button style={regSt.btn} onClick={onDone}>Create Account</button>
        <button style={regSt.link} onClick={onBack}>Already have an account? Log in</button>
      </div>
    </div>
  );
}
const regSt = {
  input: { background:'#fff', borderRadius:12, padding:'14px 16px', fontSize:15, marginBottom:13, border:'1px solid #dfe4f1', width:'100%', fontFamily:'Nunito,sans-serif', color:'#1a1a2e', outline:'none' },
  btn: { width:'100%', background:'#4361ee', color:'#fff', border:'none', borderRadius:12, padding:'14px 0', fontWeight:700, fontSize:15, fontFamily:'Nunito,sans-serif', cursor:'pointer', marginBottom:12 },
  link: { background:'none', border:'none', color:'#4361ee', fontSize:13, cursor:'pointer', fontFamily:'Nunito,sans-serif', width:'100%', textAlign:'center' },
};

function SettingsPlaceholder({ onLogout }) {
  const [key, setKey] = useState('sk-••••••••••••••••');
  return (
    <div style={{ background:'#f5f7fb', minHeight:'100%' }}>
      <div style={{ background:'linear-gradient(135deg,#2B7FFF,#1560F0)', padding:'16px 20px 24px' }}>
        <div style={{ color:'#fff', fontSize:22, fontWeight:800 }}>Settings</div>
        <div style={{ color:'rgba(255,255,255,0.8)', fontSize:13, marginTop:4 }}>Manage your account</div>
      </div>
      <div style={{ padding:'20px' }}>
        <div style={{ background:'#fff', borderRadius:16, padding:16, boxShadow:'0 1px 5px rgba(0,0,0,0.07)', marginBottom:16 }}>
          <div style={{ fontSize:11, fontWeight:700, color:'#9ca3af', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:10 }}>OpenAI API Key</div>
          <input style={{ background:'#f8f9fd', borderRadius:10, padding:'12px 14px', border:'1px solid #dfe4f1', width:'100%', fontFamily:'Nunito,sans-serif', fontSize:13, color:'#374151', outline:'none', boxSizing:'border-box' }} value={key} onChange={e=>setKey(e.target.value)}/>
          <div style={{ fontSize:11, color:'#9ca3af', marginTop:6 }}>Your key is stored on-device only.</div>
        </div>
        <div style={{ background:'#fff', borderRadius:16, overflow:'hidden', boxShadow:'0 1px 5px rgba(0,0,0,0.07)' }}>
          {[['Account', 'Jane Doe'], ['Email', 'jane@example.com'], ['Version', '1.0.0']].map(([label, val]) => (
            <div key={label} style={{ display:'flex', justifyContent:'space-between', padding:'14px 16px', borderBottom:'1px solid #f3f4f6' }}>
              <span style={{ fontSize:14, fontWeight:600, color:'#374151' }}>{label}</span>
              <span style={{ fontSize:14, color:'#9ca3af' }}>{val}</span>
            </div>
          ))}
        </div>
        <button onClick={onLogout} style={{ marginTop:20, width:'100%', background:'#fdecea', color:'#c0392b', border:'none', borderRadius:12, padding:'14px 0', fontWeight:700, fontSize:15, fontFamily:'Nunito,sans-serif', cursor:'pointer' }}>Log Out</button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

<div id="root"></div>
</body>
</html>
