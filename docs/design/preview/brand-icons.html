<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; background: #fff; font-family: 'Nunito', sans-serif; display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: center; gap: 12px; padding: 6px 0; border-bottom: 1px solid #f3f4f6; }
  .icon-box { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: #eef1ff; flex-shrink: 0; }
  .icon-name { font-size: 13px; color: #374151; font-weight: 600; }
  .icon-use { font-size: 11px; color: #9ca3af; margin-left: auto; }
</style>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head><body>
<div class="row">
  <div class="icon-box"><i data-lucide="zap" style="color:#4361ee;width:18px;height:18px;"></i></div>
  <span class="icon-name">zap</span><span class="icon-use">Generate / Flash brand</span>
</div>
<div class="row">
  <div class="icon-box"><i data-lucide="book-open" style="color:#4361ee;width:18px;height:18px;"></i></div>
  <span class="icon-name">book-open</span><span class="icon-use">Courses</span>
</div>
<div class="row">
  <div class="icon-box"><i data-lucide="file-text" style="color:#4361ee;width:18px;height:18px;"></i></div>
  <span class="icon-name">file-text</span><span class="icon-use">Documents</span>
</div>
<div class="row">
  <div class="icon-box"><i data-lucide="check-circle" style="color:#27ae60;width:18px;height:18px;"></i></div>
  <span class="icon-name">check-circle</span><span class="icon-use">Known / Correct</span>
</div>
<div class="row">
  <div class="icon-box"><i data-lucide="refresh-ccw" style="color:#d97706;width:18px;height:18px;"></i></div>
  <span class="icon-name">refresh-ccw</span><span class="icon-use">Review / Retry</span>
</div>
<div class="row">
  <div class="icon-box"><i data-lucide="upload" style="color:#4361ee;width:18px;height:18px;"></i></div>
  <span class="icon-name">upload</span><span class="icon-use">Upload screen</span>
</div>
<div class="row">
  <div class="icon-box"><i data-lucide="settings" style="color:#4361ee;width:18px;height:18px;"></i></div>
  <span class="icon-name">settings</span><span class="icon-use">Settings</span>
</div>
<div class="row">
  <div class="icon-box"><i data-lucide="plus" style="color:#4361ee;width:18px;height:18px;"></i></div>
  <span class="icon-name">plus</span><span class="icon-use">Add / Create</span>
</div>
<div class="row">
  <div class="icon-box"><i data-lucide="trophy" style="color:#d97706;width:18px;height:18px;"></i></div>
  <span class="icon-name">trophy</span><span class="icon-use">Quiz results</span>
</div>
<script>lucide.createIcons();</script>
</body></html>
