<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; background: #fff; font-family: 'Nunito', sans-serif; display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; gap: 6px; }
  .swatch { flex: 1; height: 48px; border-radius: 8px; display: flex; flex-direction: column; justify-content: flex-end; padding: 5px 7px; }
  .swatch-label { font-size: 9px; font-weight: 700; }
  .semantic-row { display: flex; gap: 8px; }
  .sem { flex: 1; border-radius: 8px; padding: 8px 10px; }
  .sem-name { font-size: 11px; font-weight: 700; }
  .sem-hex { font-size: 10px; margin-top: 2px; }
</style></head><body>
<div class="row">
  <div class="swatch" style="background:#1a1a2e;"><span class="swatch-label" style="color:#fff;">fg1</span></div>
  <div class="swatch" style="background:#6b7280;"><span class="swatch-label" style="color:#fff;">fg2</span></div>
  <div class="swatch" style="background:#9ca3af;"><span class="swatch-label" style="color:#fff;">fg3</span></div>
  <div class="swatch" style="background:#dfe4f1; border:1px solid #d1d5db;"><span class="swatch-label" style="color:#6b7280;">border</span></div>
  <div class="swatch" style="background:#f8f9fd; border:1px solid #e5e7eb;"><span class="swatch-label" style="color:#9ca3af;">inset</span></div>
</div>
<div class="semantic-row">
  <div class="sem" style="background:#e8f8ef;">
    <div class="sem-name" style="color:#27ae60;">✓ Success</div>
    <div class="sem-hex" style="color:#27ae60;">#27ae60</div>
  </div>
  <div class="sem" style="background:#fef3c7;">
    <div class="sem-name" style="color:#d97706;">↩ Warning</div>
    <div class="sem-hex" style="color:#d97706;">#d97706</div>
  </div>
  <div class="sem" style="background:#fdecea;">
    <div class="sem-name" style="color:#c0392b;">! Error</div>
    <div class="sem-hex" style="color:#c0392b;">#c0392b</div>
  </div>
</div>
</body></html>
