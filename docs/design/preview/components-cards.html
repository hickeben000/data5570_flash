<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; background: #f5f7fb; font-family: 'Nunito', sans-serif; display: flex; flex-direction: column; gap: 12px; }
  .card { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .card-title { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .card-sub { font-size: 13px; color: #6b7280; }
  .card-chevron { margin-left: auto; color: #9ca3af; font-size: 18px; }
  .card-row { display: flex; align-items: center; }
  .card-icon { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #2B7FFF, #1560F0); display: flex; align-items: center; justify-content: center; margin-right: 12px; flex-shrink: 0; }
  .card-icon svg { color: #fff; }
  .create-card { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .section-label { font-size: 12px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
</style>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head><body>
<div class="section-label">Course Card (list item)</div>
<div class="card card-row" style="cursor:pointer;">
  <div class="card-icon">
    <i data-lucide="book-open" style="color:#fff; width:20px; height:20px;"></i>
  </div>
  <div>
    <div class="card-title">Biology 101</div>
    <div class="card-sub">Created Apr 12, 2025</div>
  </div>
  <div class="card-chevron">›</div>
</div>
<div class="section-label">Document Card</div>
<div class="card card-row">
  <div class="card-icon" style="background: linear-gradient(135deg, #6366f1, #4361ee);">
    <i data-lucide="file-text" style="color:#fff; width:20px; height:20px;"></i>
  </div>
  <div>
    <div class="card-title">Chapter 5 Notes.pdf</div>
    <div class="card-sub">Uploaded Apr 15, 2025</div>
  </div>
  <div class="card-chevron">›</div>
</div>
<div class="section-label">Panel Card (create form)</div>
<div class="create-card">
  <div class="card-title" style="margin-bottom:10px;">Create a course</div>
  <input style="font-family:'Nunito',sans-serif;font-size:14px;background:#f8f9fd;border-radius:10px;padding:12px 14px;border:1px solid #dfe4f1;width:100%;box-sizing:border-box;" placeholder="Example: Biology 101">
  <button style="margin-top:10px;width:100%;background:#4361ee;color:#fff;border:none;border-radius:10px;padding:13px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;">Add Course</button>
</div>
<script>lucide.createIcons();</script>
</body></html>
