<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #f5f7fb; font-family: 'Nunito', sans-serif; display: flex; flex-direction: column; gap: 16px; align-items: flex-start; }
  .logo-wrap { background: #fff; border-radius: 16px; padding: 20px 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 0; }
  .gradient-swatch { width: 120px; height: 60px; border-radius: 12px; background: linear-gradient(135deg, #2B7FFF 0%, #1560F0 100%); display: flex; align-items: center; justify-content: center; }
  .gradient-label { color: #fff; font-size: 11px; font-weight: 700; text-align: center; }
  .usage-row { display: flex; gap: 10px; }
  .usage-chip { background: linear-gradient(135deg, #2B7FFF, #1560F0); color: #fff; border-radius: 10px; padding: 8px 16px; font-size: 13px; font-weight: 700; }
  .usage-chip-outline { border: 2px solid #4361ee; color: #4361ee; border-radius: 10px; padding: 8px 16px; font-size: 13px; font-weight: 700; }
</style></head><body>
<div class="logo-wrap">
  <img src="../assets/flash-logo.png" style="height: 72px; mix-blend-mode: multiply;" alt="Flash Logo">
</div>
<div class="usage-row">
  <div class="gradient-swatch">
    <div class="gradient-label">Brand Gradient<br>#2B7FFF→#1560F0</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;justify-content:center;">
    <div class="usage-chip">Learn in a flash</div>
    <div class="usage-chip-outline">Flash</div>
  </div>
</div>
</body></html>
