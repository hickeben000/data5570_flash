<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; background: #f5f7fb; font-family: 'Nunito', sans-serif; display: flex; flex-direction: column; gap: 12px; }
  .q-block { background: #fff; border-radius: 14px; padding: 16px; box-shadow: 0 1px 5px rgba(0,0,0,0.08); }
  .q-num { font-size: 11px; font-weight: 700; color: #4361ee; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .q-text { font-size: 15px; color: #1a1a2e; margin-bottom: 12px; line-height: 1.5; }
  .choice { padding: 11px 13px; border-radius: 10px; border: 1px solid #dfe4f1; background: #fff; margin-bottom: 8px; font-size: 14px; color: #374151; cursor: pointer; font-family: 'Nunito', sans-serif; }
  .choice.selected { border-color: #4361ee; background: #eef1ff; color: #4361ee; font-weight: 600; }
  .choice.correct { border-color: #27ae60; background: #e8f8ef; color: #27ae60; font-weight: 600; }
  .choice.wrong { border-color: #c0392b; background: #fdecea; color: #c0392b; }
</style></head><body>
<div class="q-block">
  <div class="q-num">Question 1</div>
  <div class="q-text">Which organelle is responsible for producing ATP through cellular respiration?</div>
  <div class="choice">Nucleus</div>
  <div class="choice selected">Mitochondria</div>
  <div class="choice">Ribosome</div>
  <div class="choice">Golgi apparatus</div>
</div>
<div class="q-block">
  <div class="q-num">Question 2 · Graded</div>
  <div class="q-text">What process converts glucose to pyruvate?</div>
  <div class="choice correct">Glycolysis ✓</div>
  <div class="choice wrong">Photosynthesis ✗</div>
</div>
</body></html>
