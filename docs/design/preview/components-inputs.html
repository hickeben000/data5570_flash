<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; background: #f5f7fb; font-family: 'Nunito', sans-serif; display: flex; flex-direction: column; gap: 10px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field-label { font-size: 12px; font-weight: 700; color: #6b7280; }
  input, textarea {
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    background: #fff;
    border-radius: 12px;
    padding: 13px 14px;
    border: 1px solid #dfe4f1;
    color: #1a1a2e;
    outline: none;
    width: 100%;
    box-sizing: border-box;
  }
  input.focused { border-color: #4361ee; }
  input.error-state { border-color: #c0392b; background: #fdecea; }
  input::placeholder, textarea::placeholder { color: #9ca3af; }
  .error-msg { font-size: 12px; color: #c0392b; font-weight: 600; }
</style></head><body>
<div class="field">
  <div class="field-label">Default</div>
  <input type="text" placeholder="Example: Biology 101">
</div>
<div class="field">
  <div class="field-label">Focused</div>
  <input type="text" class="focused" value="Midterm Review">
</div>
<div class="field">
  <div class="field-label">Error</div>
  <input type="text" class="error-state" value="bad value">
  <span class="error-msg">This field is required</span>
</div>
<div class="field">
  <div class="field-label">Password</div>
  <input type="password" placeholder="Password">
</div>
<div class="field">
  <div class="field-label">Long Answer (free response)</div>
  <textarea rows="3" placeholder="Type your answer..."></textarea>
</div>
</body></html>
