<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px 20px; background: #fff; font-family: 'Nunito', sans-serif; display: flex; flex-direction: column; gap: 2px; }
  .row { display: flex; align-items: baseline; gap: 12px; border-bottom: 1px solid #f0f0f0; padding: 5px 0; }
  .meta { font-size: 10px; color: #9ca3af; font-weight: 600; min-width: 80px; flex-shrink: 0; }
  .specimen { color: #1a1a2e; line-height: 1.2; }
</style></head><body>
<div class="row">
  <div class="meta">36px · 800</div>
  <div class="specimen" style="font-size:36px; font-weight:800;">Flash</div>
</div>
<div class="row">
  <div class="meta">30px · 800</div>
  <div class="specimen" style="font-size:30px; font-weight:800;">My Courses</div>
</div>
<div class="row">
  <div class="meta">26px · 800</div>
  <div class="specimen" style="font-size:26px; font-weight:800;">Quiz · Easy</div>
</div>
<div class="row">
  <div class="meta">22px · 800</div>
  <div class="specimen" style="font-size:22px; font-weight:800;">Biology 101</div>
</div>
<div class="row">
  <div class="meta">16px · 700</div>
  <div class="specimen" style="font-size:16px; font-weight:700;">Create a course</div>
</div>
<div class="row">
  <div class="meta">16px · 400</div>
  <div class="specimen" style="font-size:16px; font-weight:400; color:#6b7280;">Study smarter, not harder</div>
</div>
<div class="row">
  <div class="meta">15px · 400</div>
  <div class="specimen" style="font-size:15px; font-weight:400; color:#6b7280;">Add study materials and generate flashcards.</div>
</div>
<div class="row">
  <div class="meta">12px · 700 ↑</div>
  <div class="specimen" style="font-size:12px; font-weight:700; color:#4361ee; text-transform:uppercase; letter-spacing:0.06em;">Question</div>
</div>
<div class="row">
  <div class="meta">12px · 400</div>
  <div class="specimen" style="font-size:12px; color:#9ca3af;">Tap to flip</div>
</div>
</body></html>
