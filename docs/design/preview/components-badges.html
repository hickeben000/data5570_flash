<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; background: #f5f7fb; font-family: 'Nunito', sans-serif; display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-start; }
  .badge { display: inline-flex; align-items: center; gap: 5px; border-radius: 9999px; padding: 5px 12px; font-size: 12px; font-weight: 700; }
  .badge-primary { background: #eef1ff; color: #4361ee; }
  .badge-success { background: #e8f8ef; color: #27ae60; }
  .badge-warning { background: #fef3c7; color: #d97706; }
  .badge-error { background: #fdecea; color: #c0392b; }
  .badge-neutral { background: #e5e7eb; color: #374151; }
  .badge-brand { background: linear-gradient(135deg, #2B7FFF, #1560F0); color: #fff; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
</style></head><body>
<span class="badge badge-brand">Flash</span>
<span class="badge badge-primary"><span class="dot"></span>Active</span>
<span class="badge badge-success"><span class="dot"></span>Known</span>
<span class="badge badge-warning"><span class="dot"></span>Review</span>
<span class="badge badge-error"><span class="dot"></span>Error</span>
<span class="badge badge-neutral">Easy</span>
<span class="badge badge-neutral">Medium</span>
<span class="badge badge-neutral">Hard</span>
<span class="badge badge-primary">10 cards</span>
<span class="badge badge-success">8 / 10 ✓</span>
</body></html>
